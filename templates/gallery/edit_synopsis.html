{% extends 'shared/base.html' %}
{% load static %}
{% block content %}

            <section class="gallery" style="margin-left: 5em;">
                <form action="{% url 'edit_synopsis' synopsis_id %}" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row">
                        {% for field in form.visible_fields %}
                        <div class="col-12 col-lg-12" style="margin-bottom: 10px;">
                            <label for="{{ field.id_for_label }}" style="color: #D9D9D9;">
                                {{field.label}}
                            </label>
                            {{ field }}
                        </div>
                        {% endfor %}
                    </div>
                    <div>
                        <button type="submit" class="btn btn-success" style="padding: top 5px;">Edit synopsis</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>

{% endblock %}
